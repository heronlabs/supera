name: 'Continuous Deployment'

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      spec:
        description: The SEMVER specification.
        required: true
        type: choice
        default: patch
        options:
          - 'major'
          - 'minor'
          - 'patch'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: 'Tag, sync manifests, and release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: heronlabs/action-tag-release-build@v4
        id: version
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          spec: ${{ inputs.spec }}

      - uses: heronlabs/action-claude-plugin-build@v2
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Derive and push major/minor semver tags
        shell: bash
        run: |
          FULL_VERSION="${{ steps.version.outputs.version }}"
          CLEAN_VERSION="${FULL_VERSION#v}"
          MAJOR="${CLEAN_VERSION%%.*}"
          REST="${CLEAN_VERSION#*.}"
          MINOR="${REST%.*}"

          git tag -f "v${MAJOR}" "${{ github.sha }}"
          git tag -f "v${MAJOR}.${MINOR}" "${{ github.sha }}"
          git push origin -f "v${MAJOR}"
          git push origin -f "v${MAJOR}.${MINOR}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ steps.version.outputs.version }}
          path: |
            .
