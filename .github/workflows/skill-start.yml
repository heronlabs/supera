# Prerequisites:
#   - `ANTHROPIC_API_KEY` repo secret (or swap it for
#     `claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}`).
#   - `SUPERA_AUDIT_TOKEN`: a PAT/App token with `contents` + `pull-requests`
#     scope so supera can push the branch and open the PR; add `workflow` scope
#     only if a delivery may touch `.github/workflows/*` (the default
#     `GITHUB_TOKEN` lacks `workflow` scope). The default `GITHUB_TOKEN` works
#     for non-workflow deliveries.
name: 'Skill | start'

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description, or an existing branch to resume/close out.'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.task }}
  cancel-in-progress: false

jobs:
  start:
    name: 'Deliver task'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.SUPERA_AUDIT_TOKEN || secrets.GITHUB_TOKEN }}

      # supera-engineer commits the work via raw git, so give it an identity
      # (claude-code-action only auto-configures git in its tag mode, not prompt mode).
      - run: |
          git config --global user.name 'supera-bot'
          git config --global user.email 'supera-bot@users.noreply.github.com'

      # supera-engineer runs the repo's verify commands in the worktree /start
      # creates, so set up the toolchain. /start runs install inside that
      # worktree — no root-level `pnpm install` step here.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - uses: anthropics/claude-code-action@30544b674398ee15c84819bd87caf8a87e8c7b55 # v1.0.154
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.SUPERA_AUDIT_TOKEN || secrets.GITHUB_TOKEN }}
          plugin_marketplaces: https://github.com/heronlabs/supera.git
          plugins: supera@supera-marketplace
          prompt: |
            Deliver the task below using the supera start skill — run the command at the end. This is a headless run with no human present, so never stop to ask; if you hit a block, surface it as a comment on the PR once one exists, or print it to the run output if no PR exists yet.
            /supera:start ${{ github.event.inputs.task }} --non-interactive
          show_full_output: true
          claude_args: '--allowed-tools Bash,Read,Glob,Grep,Agent,Edit,Write,Skill'
