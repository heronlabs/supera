# Prerequisites:
#   - `ANTHROPIC_API_KEY` repo secret (or swap it for
#     `claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}`).
#   - `SUPERA_AUDIT_TOKEN`: a PAT/App token with `contents` + `pull-requests`
#     scope so supera can push the fix and reply on the PR; add `workflow` scope
#     only if a fix may touch `.github/workflows/*` (the default `GITHUB_TOKEN`
#     lacks `workflow` scope). The default `GITHUB_TOKEN` works for non-workflow
#     fixes.
#
# Security note: this runs the bumped dependency's tests with repo secrets in
# scope — an accepted risk for auto-fixing a Dependabot bump. Keep the
# `SUPERA_AUDIT_TOKEN` minimally scoped (contents + pull-requests, workflow only
# if needed). It fires on a FAILED CI run of a Dependabot PR or supera's own
# `supera`-labelled ship PR (auto-fix), and on a PASSING CI run of a Dependabot
# PR (auto-resolve via the security auditor's verdict when enabled).
name: 'Skill | pr-watch'

on:
  workflow_run:
    workflows: ['Continuous Integration']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  pr-watch:
    name: 'Auto-fix or auto-resolve PR'
    if: >-
      github.event.workflow_run.event == 'pull_request' && (
        contains(fromJSON('["failure","timed_out"]'), github.event.workflow_run.conclusion) ||
        (github.event.workflow_run.conclusion == 'success' &&
         github.event.workflow_run.actor.login == 'dependabot[bot]')
      )
    runs-on: ubuntu-latest
    steps:
      # checkout + supera-bot git identity + toolchain (toolchain only). Swap
      # `stack` for your repo's: pnpm | npm | yarn | cargo | go.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.SUPERA_AUDIT_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/supera-bootstrap
        with:
          stack: pnpm

      # pr-watch (unlike /ship and /audit) installs at the workflow root so the
      # auto-fix step has the deps already resolved.
      - run: pnpm install --frozen-lockfile

      - id: pr
        env:
          GH_TOKEN: ${{ secrets.SUPERA_AUDIT_TOKEN || secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          ACTOR: ${{ github.event.workflow_run.actor.login }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail
          PR=$(gh pr list --head "$HEAD_BRANCH" --state open --json number,labels -q '.[0]')
          NUMBER=$(echo "$PR" | jq -r '.number // empty')
          if [ -z "$NUMBER" ]; then
            echo "No open PR for $HEAD_BRANCH — nothing to watch."
            echo "number=" >> "$GITHUB_OUTPUT"; exit 0
          fi
          HAS_SUPERA=$(echo "$PR" | jq -r 'any(.labels[]?; .name == "supera")')
          IS_DEPENDABOT=false
          if [ "$ACTOR" = "dependabot[bot]" ]; then IS_DEPENDABOT=true; fi
          # On a PASSING run a PR is eligible only when it's Dependabot AND the repo
          # opted into auto-resolve (audits.dependabot.autoResolveOnPass) — otherwise a
          # flag-off green run would burn a no-op headless claude run; a supera-labelled
          # human ship PR never auto-merges on green. On failure/timed_out either a
          # Dependabot or supera-labelled PR is eligible (auto-fix) — the existing behaviour.
          if [ "$CONCLUSION" = "success" ]; then
            AUTO=$(jq -r '.audits.dependabot.autoResolveOnPass // false' .claude/supera.json 2>/dev/null || echo false)
            if [ "$IS_DEPENDABOT" = "true" ] && [ "$AUTO" = "true" ]; then ELIGIBLE=true; else ELIGIBLE=false; fi
          elif [ "$IS_DEPENDABOT" = "true" ] || [ "$HAS_SUPERA" = "true" ]; then
            ELIGIBLE=true
          else
            ELIGIBLE=false
          fi
          if [ "$ELIGIBLE" = "true" ]; then
            echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          elif [ "$CONCLUSION" = "success" ]; then
            echo "PR #$NUMBER not eligible for conclusion=success (autoResolveOnPass off or not Dependabot) — skipping."
            echo "number=" >> "$GITHUB_OUTPUT"
          else
            echo "PR #$NUMBER not eligible for conclusion=$CONCLUSION — skipping."
            echo "number=" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.pr.outputs.number != ''
        id: claude
        uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d # v1.0.157
        with:
          allowed_bots: '*' # eligibility is decided in the `pr` step (Dependabot or supera-labelled); '*' avoids the brittle 'dependabot' vs 'dependabot[bot]' login mismatch
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.SUPERA_AUDIT_TOKEN || secrets.GITHUB_TOKEN }}
          plugin_marketplaces: https://github.com/heronlabs/supera.git
          plugins: supera@supera-marketplace
          prompt: |
            A pull request (#${{ steps.pr.outputs.number }}) needs attention after its CI run.
            Run the supera pr-watch skill via the command below — it drives a failing run green, or auto-resolves a green Dependabot bump per config. This is a headless run with no human present, so never stop to ask; surface any block as a PR comment.
            /supera:pr-watch ${{ steps.pr.outputs.number }} --non-interactive
          show_full_output: true
          claude_args: '--allowed-tools Bash,Read,Glob,Grep,Agent,Edit,Write,Skill'

      # Run-level telemetry (issue #48 Phase 1): map the action's execution file
      # into a privacy-safe metrics-event.json and upload it for the daily
      # rollup. Self-contained (jq only); a skipped claude step leaves
      # EXECUTION_FILE empty and the emit no-ops. Privacy is structural — only
      # the schema's known, constrained fields are ever written.
      - id: metrics
        name: 'Build run-metrics event'
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SKILL: pr-watch
        run: |
          set -euo pipefail
          if [ -z "${EXECUTION_FILE:-}" ] || [ ! -s "$EXECUTION_FILE" ]; then
            echo 'No execution file — skipping run-metrics emit.'
            exit 0
          fi
          result=$(jq -c 'map(select(.type == "result")) | last' "$EXECUTION_FILE")
          if [ -z "$result" ] || [ "$result" = 'null' ]; then
            echo 'No result message — skipping run-metrics emit.'
            exit 0
          fi
          model=$(jq -r 'map(select(.type == "system" and .subtype == "init")) | (first.model // "")' "$EXECUTION_FILE")
          stack=$(jq -r '.stack // "unknown"' .claude/supera.json 2>/dev/null || echo unknown)
          jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg repo "$REPO" \
            --arg skill "$SKILL" \
            --arg model "$model" \
            --arg stack "$stack" \
            --argjson run_id "$RUN_ID" \
            --argjson run_attempt "$RUN_ATTEMPT" \
            --argjson result "$result" \
            '{
              schema_version: "1",
              ts: $ts,
              repo: $repo,
              skill: $skill,
              event: "run",
              outcome: (if $result.subtype == "success" then "success" else "error" end),
              model: (if ($model | test("^claude-[a-z0-9.-]+$")) then $model else "claude-unknown" end),
              stack: (if ($stack | test("^[a-z]+$")) then $stack else "unknown" end),
              run: {
                cost_usd: ($result.total_cost_usd // 0),
                num_turns: ($result.num_turns // 0),
                duration_ms: ($result.duration_ms // 0),
                tokens: {
                  input: ($result.usage.input_tokens // 0),
                  output: ($result.usage.output_tokens // 0),
                  cache_read: ($result.usage.cache_read_input_tokens // 0),
                  cache_creation: ($result.usage.cache_creation_input_tokens // 0)
                }
              },
              gh: {run_id: $run_id, run_attempt: $run_attempt}
            }' > metrics-event.json
          if jq -e '
            .schema_version == "1"
            and (.repo | test("^[^/]+/[^/]+$"))
            and (.skill | IN("ship", "pr-watch", "audit", "refactor"))
            and (.outcome | IN("success", "blocked", "needs-review", "error"))
            and (.model | test("^claude-[a-z0-9.-]+$"))
            and (.stack | test("^[a-z]+$"))
            and (.run.cost_usd | type == "number")
            and (.run.tokens.input | type == "number")
            and (.gh.run_id | type == "number")
          ' metrics-event.json > /dev/null 2>&1; then
            echo 'Run-metrics event built and structurally validated.'
          else
            echo '::warning::run-metrics event failed structural validation — dropping it.'
            rm -f metrics-event.json
          fi

      - name: 'Upload run-metrics artifact'
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: metrics-${{ github.run_id }}
          path: metrics-event.json
          if-no-files-found: ignore
          retention-days: 90
