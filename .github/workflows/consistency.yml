name: consistency
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install validator deps
        run: pip install --quiet jsonschema
      - name: Run consistency gate
        run: bash scripts/check-consistency.sh
